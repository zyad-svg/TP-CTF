<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HACKNET — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body>
  <div class="scanlines"></div>
  <div class="noise"></div>

  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-prompt">&gt;</span> HACKNET
    </div>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link active">-/home</a></li>
    </ul>
    <button class="nav-burger" id="navBurger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main class="main-content">
    <div class="terminal-panel">
      <div class="terminal-titlebar">
        <span class="dot dot-red"></span>
        <span class="dot dot-yellow"></span>
        <span class="dot dot-green"></span>
        <span class="terminal-title">root@hacknet ~ /login</span>
      </div>
      <div class="terminal-body">
        <p class="term-line"><span class="prompt">&gt;</span> ./authenticate.sh</p>
        <p class="term-output">Initialising secure session... <span class="ok">[OK]</span></p>
        <p class="term-output">Loading credentials module... <span class="ok">[OK]</span></p>
        <p class="term-output">Awaiting input...</p>
      </div>
    </div>

    <div class="login-panel">
      <div class="login-header">
        <h1 class="login-title">HACKNET<span class="title-accent">.COM</span></h1>
        <p class="login-sub">CAPTURE. EXPLOIT. DOMINATE.</p>
      </div>

      <form class="login-form" id="loginForm" action="#" method="POST">
        <div class="field-group">
          <label class="field-label" for="username">IDENTIFIER</label>
          <div class="field-wrap">
            <span class="field-prompt">&gt;_</span>
            <input class="field-input" type="text" id="username" name="username" autocomplete="off" placeholder="enter username" />
          </div>
        </div>
        <div class="field-group">
          <label class="field-label" for="password">PASSPHRASE</label>
          <div class="field-wrap">
            <span class="field-prompt">&gt;_</span>
            <input class="field-input" type="password" id="password" name="password" autocomplete="off" placeholder="••••••••" />
          </div>
        </div>
        <div class="form-error hidden" id="formError">
          <span class="err-icon">[!]</span> <span id="errorMsg">Authentication failed.</span>
        </div>
        <button class="btn-primary" type="submit">Connect</button>
      </form>
    </div>
  </main>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
